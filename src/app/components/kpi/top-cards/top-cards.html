<div class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-7 gap-4">
  @for (kpi of kpiData; track kpi.label) {
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 flex flex-col items-center justify-center gap-1 transition-all hover:shadow-md">
      <span class="text-slate-400 text-[11px] font-bold uppercase tracking-wider text-center">
        {{ kpi.label }}
      </span>
      <span class="text-3xl font-light text-slate-800 mt-2">
        {{ kpi.value }}
      </span>
    </div>
  }
</div>
