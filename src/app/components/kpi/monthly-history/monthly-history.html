<div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 h-full flex flex-col min-h-[300px]">
  <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-6 pb-4 border-b border-slate-100">
    Historial mensual
  </h3>

  <div class="flex flex-col gap-5 flex-1">
    @for (item of historyData; track item.label) {
      <div class="flex justify-between items-center py-1">
        <span class="text-slate-500 text-[13px]">{{ item.label }}</span>
        <span class="text-slate-800 font-medium text-sm">{{ item.value }}</span>
      </div>
    }
  </div>
</div>
