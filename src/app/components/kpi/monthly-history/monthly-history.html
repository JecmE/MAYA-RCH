<div class="card h-full flex flex-col">
  <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-6">
    Historial mensual
  </h3>

  <div class="flex-1 overflow-auto">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="border-b border-slate-100">
          <th class="py-3 px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Mes</th>
          <th class="py-3 px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Días Trab.</th>
          <th class="py-3 px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Tardías</th>
          <th class="py-3 px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Cumplimiento</th>
          <th class="py-3 px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-right">Estado</th>
        </tr>
      </thead>
      <tbody>
        @for (item of historyData; track $index) {
          <tr class="border-b border-slate-50 last:border-0 hover:bg-slate-50 transition-colors">
            <td class="py-4 px-4">
              <span class="text-sm font-semibold text-slate-700">{{ getMonthName(item.mes!) }}</span>
              <span class="text-[10px] text-slate-400 block">{{ item.anio }}</span>
            </td>
            <td class="py-4 px-4 text-sm text-slate-600">{{ item.diasTrabajados }}</td>
            <td class="py-4 px-4 text-sm text-slate-600">{{ item.tardias }}</td>
            <td class="py-4 px-4">
              <div class="flex items-center gap-2">
                <span class="text-sm font-medium text-slate-700">{{ item.cumplimientoPct }}%</span>
                <div class="w-12 h-1.5 bg-slate-100 rounded-full overflow-hidden hidden sm:block">
                  <div
                    class="h-full bg-amber-400 rounded-full"
                    [style.width.%]="item.cumplimientoPct"
                  ></div>
                </div>
              </div>
            </td>
            <td class="py-4 px-4 text-right">
              <span class="px-2 py-1 rounded-md text-[10px] font-bold uppercase" [class]="getStatusClass(item.clasificacion)">
                {{ item.clasificacion }}
              </span>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="5" class="py-12 text-center text-slate-400 text-sm">
              No hay datos históricos disponibles
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
