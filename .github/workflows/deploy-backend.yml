name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Build and Package
        run: |
          cd backend
          npm install
          npm run build
          # Crear una carpeta limpia solo con lo necesario para ejecutar
          mkdir ../deploy
          cp -r dist/* ../deploy/
          cp package.json ../deploy/
          cp package-lock.json ../deploy/
          cd ../deploy
          npm install --production

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mayarch'
          slot-name: 'Production'
          package: deploy
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHProfile_38FAD546A00C49C69E883B2D5B3E0A95 }}
