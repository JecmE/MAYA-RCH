name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Build
        run: |
          cd backend
          npm install
          npx nest build

      - name: Create Production Bundle
        run: |
          mkdir deploy_root
          # Copiamos lo compilado a la raíz de la carpeta de despliegue
          cp -r backend/dist/* deploy_root/
          cp backend/package.json deploy_root/
          cp backend/package-lock.json deploy_root/
          cd deploy_root
          # Instalamos solo dependencias de ejecución para que vuele
          npm install --omit=dev

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mayarch'
          slot-name: 'Production'
          package: deploy_root
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHProfile_38FAD546A00C49C69E883B2D5B3E0A95 }}
