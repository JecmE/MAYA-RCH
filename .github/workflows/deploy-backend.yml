name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Build Backend
        run: |
          cd backend
          npm install
          # Usamos npx para asegurar que encuentre Nest
          npx nest build

      - name: Zip Bundle for Azure
        run: |
          # Creamos un paquete con solo lo que Azure necesita para correr
          mkdir -p release
          cp -r backend/dist/* release/
          cp backend/package.json release/
          cp backend/package-lock.json release/
          cd release
          npm install --production

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mayarch'
          slot-name: 'Production'
          package: release
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHProfile_38FAD546A00C49C69E883B2D5B3E0A95 }}
