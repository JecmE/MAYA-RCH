name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Build Backend
        run: |
          cd backend
          npm install
          # Usamos el comando directo para evitar el error de "nest not found"
          ./node_modules/.bin/nest build

      - name: Prepare Final Package
        run: |
          # Creamos una carpeta limpia con solo lo necesario para que Azure no se pierda
          mkdir deploy_folder
          cp -r backend/dist/* deploy_folder/
          cp backend/package.json deploy_folder/
          cp backend/package-lock.json deploy_folder/
          cd deploy_folder
          # Instalamos solo las librerías de producción para que sea ligero
          npm install --production

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mayarch'
          slot-name: 'Production'
          package: deploy_folder
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHProfile_38FAD546A00C49C69E883B2D5B3E0A95 }}
